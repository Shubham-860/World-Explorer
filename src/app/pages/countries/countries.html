<section class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
  @if (loading()) {
    <div class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
      @for (_ of skeletonCards; track $index) {
        <div class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
          <div class="animate-pulse space-y-4">
            <div class="h-32 rounded-md bg-slate-200"></div>
            <div class="h-5 w-2/3 rounded bg-slate-200"></div>
            <div class="h-4 rounded bg-slate-200"></div>
            <div class="h-4 w-4/5 rounded bg-slate-200"></div>
          </div>
        </div>
      }
    </div>
  } @else {
    <div class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
      @for (country of cs.countries(); track country.uuid) {
        <a [routerLink]="['/country', country.names?.official]">
          <article
            class="overflow-hidden rounded-lg border border-slate-200 h-full bg-white shadow-sm transition hover:-translate-y-0.9 hover:shadow-md"
          >
            <div class="aspect-video bg-slate-100">
              <img
                class="h-full w-full object-cover"
                [src]="country.flag.url_svg || country.flag.url_png || '/NoImageFound.jpg'"
                [alt]="(country.names?.common || 'Country') + ' flag'"
                loading="lazy"
              />
            </div>

            <div class="space-y-2 px-5 py-4">
              <h2 class="text-lg font-semibold text-slate-950">{{ country.names?.common }}</h2>
              <p class="text-sm leading-6 text-slate-600">
                Official name: {{ country.names?.official }}
              </p>
            </div>
          </article>
        </a>
      } @empty {
        <p
          class="col-span-full rounded-lg border border-slate-200 bg-white p-6 text-center text-slate-600"
        >
          No countries found.
        </p>
      }
    </div>
  }
</section>
